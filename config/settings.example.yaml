# 複製此檔為 settings.yaml 並填入實際值
# cp config/settings.example.yaml config/settings.yaml

llm:
  host: "http://127.0.0.1:11434"      # Ollama 在 Mac 本機執行
  model: "llama3:8b"
  timeout: 30

tts:
  api_url: ""            # GPT-SoVITS URL (e.g. http://127.0.0.1:9880), leave empty to use edge-tts
  edge_voice: "zh-TW-HsiaoChenNeural"  # edge-tts voice, used when api_url is empty
  say_voice: "Mei-Jia"                 # macOS say fallback voice (run `say -v ?` to list)
asr:
  engine: "faster_whisper"
  model_size: "medium"
  language: "zh"
  push_to_talk_key: "alt"

api:
  host: "0.0.0.0"
  port: 8000
  api_key: "your_secret_key_here"    # 建議設定，留空則停用驗證
  mac_host: "http://192.168.1.XXX:8000"  # PC 呼叫 Mac 用，填入 Mac 的局域網 IP

discord:
  token: "your_bot_token_here"
  command_prefix: "!"
  notify_channel_id: 123456789
  allowed_user_ids: [123456789]      # 你的 Discord 使用者 ID
  notify_throttle_seconds: 30

character:
  name: "Kunomi"
  idle_timeout_seconds: 120
  idle_max_loops: 5

filter:
  blocked_keywords_file: "config/blocked_keywords.txt"
  ai_semantic_filter: false          # 穩定後再開啟，會增加 LLM 呼叫次數

vtube_studio:
  api_url: "ws://192.168.1.XXX:8001" # 4070 PC VTube Studio WebSocket
  plugin_name: "Kunomi-core"
  plugin_developer: "you"
  idle_motion:                        # VTS face-tracking INPUT parameter names (not Live2D output)
    param_angle_x:    "FaceAngleX"   # check your VTS parameter list for exact names
    param_angle_y:    "FaceAngleY"
    param_angle_z:    "FaceAngleZ"
    param_breath:     "Breathing"
    param_eye_ball_x: "EyeRightX"
    param_eye_ball_y: "EyeRightY"
    param_eye_l_open: "EyeOpenLeft"
    param_eye_r_open: "EyeOpenRight"
    param_mouth_open: "MouthOpen"

pc_agent:
  host: "http://192.168.1.XXX:8100"
  api_key: "your_secret_key_here"

vision:
  model: "llava:7b"

soundboard:
  sounds_dir: "assets/sounds"

minecraft:
  log_path: "C:/mc-server/logs/latest.log"
  poll_interval_seconds: 3

roblox:
  webhook_secret: "your_roblox_secret"

memory:
  db_path: "chroma_db"
  max_events: 500

twitch:
  username: ""                        # Bot 的 Twitch 帳號名稱
  token: ""                           # OAuth token（格式：oauth:xxxxxxx）
  channel: ""                         # 要監聽的頻道名稱（不含 #）
  response_rate: 0.3                  # 每則訊息回應機率（0.0~1.0）
  min_interval: 8                     # 兩次回應最少間隔秒數

youtube:
  api_key: ""                         # Google Cloud API Key（需啟用 YouTube Data API v3）
  live_chat_id: ""                    # 直播 liveChatId（留空則由 video_id 自動取得）
  video_id: ""                        # 直播影片 ID（用於自動取得 liveChatId）
  poll_interval: 5                    # 輪詢間隔秒數（建議 >= 5）
  response_rate: 0.3
  min_interval: 8
