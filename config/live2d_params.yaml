# Live2D 情緒參數預設值
# 每個情緒定義一組 VTube Studio InjectParameterData 參數
# 參數名稱需與 VTube Studio 內的 Custom Parameter 或內建 Parameter 一致
#
# 常見內建參數：
#   FaceAngleX      頭部左右轉（-30 ~ 30）
#   FaceAngleY      頭部上下點頭（-30 ~ 30）
#   FaceAngleZ      頭部左右傾（-30 ~ 30）
#   EyeOpenLeft     左眼開合（0 = 閉、1 = 全開）
#   EyeOpenRight    右眼開合（0 = 閉、1 = 全開）
#   EyeLeftX        左眼水平視線（-1 ~ 1）
#   EyeLeftY        左眼垂直視線（-1 ~ 1）
#   EyeRightX       右眼水平視線
#   EyeRightY       右眼垂直視線
#   BrowLeftY       左眉高度（-1 ~ 1）
#   BrowRightY      右眉高度（-1 ~ 1）
#   MouthSmile      嘴角（-1 = 皺眉、1 = 微笑）
#
# duration: 持續秒數，之後線性回歸預設值（0 = 永久保持直到下一個情緒）

neutral:
  duration: 0
  params:
    FaceAngleX: 0
    FaceAngleY: 0
    FaceAngleZ: 0
    EyeOpenLeft: 0.8
    EyeOpenRight: 0.8
    BrowLeftY: 0
    BrowRightY: 0
    MouthSmile: -0.1

sarcastic:                  # 毒舌／吐槽（Kunomi 的預設模式）
  duration: 4
  params:
    FaceAngleY: -5          # 略微低頭，居高臨下感
    FaceAngleZ: 3           # 微微側頭
    EyeOpenLeft: 0.5        # 半眯眼
    EyeOpenRight: 0.5
    EyeLeftY: -0.3          # 眼神下移，看不起
    EyeRightY: -0.3
    BrowLeftY: 0.3          # 單邊眉毛上揚
    BrowRightY: -0.1
    MouthSmile: -0.3        # 不屑嘴角

surprised:                  # 驚訝（遇到 bug / 奇怪事件）
  duration: 2
  params:
    FaceAngleY: 5           # 抬頭
    EyeOpenLeft: 1.0        # 瞪大眼
    EyeOpenRight: 1.0
    BrowLeftY: 0.8
    BrowRightY: 0.8
    MouthSmile: 0.1

death:                      # 玩家死亡：冷眼旁觀
  duration: 3
  params:
    FaceAngleY: -8
    FaceAngleZ: 5
    EyeOpenLeft: 0.4
    EyeOpenRight: 0.4
    EyeLeftY: -0.4
    EyeRightY: -0.4
    BrowLeftY: 0.2
    MouthSmile: -0.2

win:                        # 勝利：假裝淡定，但眼神有點亮
  duration: 3
  params:
    FaceAngleY: 2
    EyeOpenLeft: 0.9
    EyeOpenRight: 0.9
    BrowLeftY: 0.1
    BrowRightY: 0.1
    MouthSmile: 0.2

chat:                       # 觀眾聊天：正視前方，略帶不耐
  duration: 3
  params:
    FaceAngleX: 0
    FaceAngleY: 0
    EyeOpenLeft: 0.75
    EyeOpenRight: 0.75
    BrowLeftY: -0.1
    MouthSmile: -0.1

idle:                       # 冷場自言自語：無聊地望向旁邊
  duration: 5
  params:
    FaceAngleX: 15          # 轉頭看旁邊
    FaceAngleY: -3
    EyeOpenLeft: 0.6
    EyeOpenRight: 0.6
    EyeLeftX: 0.5           # 眼神也跟著側移
    EyeRightX: 0.5
    MouthSmile: -0.15

voice:                      # 語音指令：聽指令，側耳聆聽感
  duration: 2
  params:
    FaceAngleZ: -5          # 頭側傾
    EyeOpenLeft: 0.85
    EyeOpenRight: 0.85
    BrowLeftY: 0.1

vision:                     # 看截圖：眼神向上，好像在看螢幕
  duration: 3
  params:
    FaceAngleY: 8           # 抬頭看
    EyeOpenLeft: 0.9
    EyeOpenRight: 0.9
    EyeLeftY: 0.4           # 眼神向上
    EyeRightY: 0.4
